name: pypi-publish

on:
  release:
    types: [ published ]
  workflow_dispatch:

jobs:
  run-tests:
    uses: ./.github/workflows/code-coverage.yml

  pypi-publisher:
    needs: run-tests
    runs-on: thevickypedia-default
    steps:
      - uses: thevickypedia/pypi-publisher@v3
        env:
          token: ${{ secrets.PYPI_TOKEN }}
